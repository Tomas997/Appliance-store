spring.datasource.url=jdbc:h2:mem:store
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
server.port=8080
server.servlet.session.timeout=30m

spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:manufacturer.sql, classpath:client.sql, classpath:employee.sql, classpath:deliverer.sql, classpath:appliance.sql, classpath:orders.sql, classpath:order_row.sql

spring.messages.basename=messages/messages

spring.mvc.hiddenmethod.filter.enabled=true

logging.level.root=INFO
logging.level.com.epam.rd.autocode.assessment.appliances=DEBUG
logging.level.org.springframework.security=INFO
