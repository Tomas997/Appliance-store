<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
    <title th:text="#{appliance.header.list}">Appliances list</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main>
    <h1 th:text="#{appliance.header.list}">Appliances list</h1>

    <form th:action="@{/appliances}" method="get" class="d-flex gap-2 mb-3" style="max-width: 400px;">
        <input type="text" name="q" th:value="${q}" class="form-control"
               th:placeholder="#{appliance.search.placeholder}" placeholder="Search by name..."/>
        <button type="submit" class="btn btn-outline-primary" th:text="#{common.btn.search}">Search</button>
        <a th:if="${q != null and !#strings.isEmpty(q)}" th:href="@{/appliances}" class="btn btn-outline-secondary" th:text="#{common.btn.clear}">Clear</a>
    </form>

    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.appliance.id}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('name', 'object.appliance.name')}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('category', 'object.appliance.category')}"></th>
            <th th:text="#{object.appliance.model}"></th>
            <th th:text="#{object.appliance.manufacturer}"></th>
            <th th:text="#{object.appliance.powerType}"></th>
            <th th:text="#{object.appliance.characteristic}"></th>
            <th th:text="#{object.appliance.description}"></th>
            <th th:text="#{object.appliance.power}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('price', 'object.appliance.price')}"></th>
             <th th:text="#{object.operation}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appliance: ${appliances}">
            <td><span class="float-end" th:text="${appliance.id}"/></td>
            <td th:text="${appliance.name}"/>
            <td><span class="float-end" th:text="${appliance.category}"/></td>
            <td th:text="${appliance.model}"/>
            <td><span class="float-end" th:text="${appliance.manufacturerName}"/></td>
            <td th:text="${appliance.powerType}"/>
            <td th:text="${appliance.characteristic}"/>
            <td th:text="${appliance.description}"/>
            <td><span class="float-end" th:text="${appliance.power}"/></td>
            <td><span class="float-end" th:text="${appliance.price}"/></td>
            <td>
                <div class="d-flex gap-2">
                    <a th:href="@{/appliances/{id}/edit(id=${appliance.id})}" class="btn btn-sm btn-warning">
                        <i class="fa fa-pencil"></i>
                    </a>
                    <form th:action="@{/appliances/{id}(id=${appliance.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fa fa-minus"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/table-fragments :: pagination}"></div>

    <a th:href="@{appliances/add}" class="btn btn-primary" th:text="#{appliance.btn.new}">New appliance</a>
</main>
<div th:insert="~{footer::footer}"></div>


</body>
</html>
