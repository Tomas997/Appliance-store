<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{appliance.header.edit}">Edit Appliance</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1 th:text="#{appliance.header.edit}">Edit Appliance</h1>
<form action="#" th:action="@{/appliances/{id}/edit(id=${applianceId})}" th:object="${appliance}" method="post">
    <input type="hidden" name="_method" value="PUT"/>
    <p>
        <span th:text="#{object.appliance.name}"></span>
        <input type="text" th:field="*{name}"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.category}"></span>
        <select th:field="*{category}">
            <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
        </select>
        <span th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.model}"></span>
        <input type="text" th:field="*{model}"/>
        <span th:if="${#fields.hasErrors('model')}" th:errors="*{model}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.manufacturer}"></span>
        <select th:field="*{manufacturerId}">
            <option th:each="manufacturer : ${manufacturers}"
                    th:value="${manufacturer.id}"
                    th:text="${manufacturer.name}"></option>
        </select>
        <span th:if="${#fields.hasErrors('manufacturerId')}" th:errors="*{manufacturerId}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.powerType}"></span>
        <select th:field="*{powerType}">
            <option th:each="powerType : ${powerTypes}" th:value="${powerType}" th:text="${powerType}"></option>
        </select>
        <span th:if="${#fields.hasErrors('powerType')}" th:errors="*{powerType}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.characteristic}"></span>
        <input type="text" th:field="*{characteristic}"/>
        <span th:if="${#fields.hasErrors('characteristic')}" th:errors="*{characteristic}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.description}"></span>
        <input type="text" th:field="*{description}"/>
        <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.power}"></span>
        <input type="text" th:field="*{power}"/>
        <span th:if="${#fields.hasErrors('power')}" th:errors="*{power}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.appliance.price}"></span>
        <input type="text" th:field="*{price}"/>
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></span>
    </p>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" th:text="#{common.btn.save}">Save</button>
        <a th:href="@{/appliances}" class="btn btn-secondary" th:text="#{common.btn.cancel}">Cancel</a>
    </div>
</form>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
