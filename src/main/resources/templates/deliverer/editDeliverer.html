<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Edit Deliverer</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<main class="container mt-3">
    <h1>Edit Deliverer</h1>
    <form th:action="@{/deliverers/{id}/edit(id=${delivererId})}" th:object="${deliverer}" method="post">
        <input type="hidden" name="_method" value="PUT"/>
        <div class="mb-3">
            <label th:text="#{object.user.name}" class="form-label"></label>
            <input type="text" th:field="*{name}" class="form-control"/>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
        </div>
        <div class="mb-3">
            <label th:text="#{object.user.email}" class="form-label"></label>
            <input type="email" th:field="*{email}" class="form-control"/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
        </div>
        <div class="mb-3">
            <label th:text="#{object.user.password}" class="form-label"></label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Leave blank to keep current"/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></span>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/deliverers}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
