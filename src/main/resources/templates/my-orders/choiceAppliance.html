<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{appliance.header.list}"></title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{appliance.header.list}">Appliances</h1>

    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.appliance.name}">Name</th>
            <th th:text="#{object.appliance.price}">Price</th>
            <th th:text="#{common.label.quantity}">Quantity</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appliance : ${appliances}">
            <td th:text="${appliance.name}"></td>
            <td th:text="${appliance.price}"></td>
            <td>
                <form th:action="@{/my-orders/add-into-order}" method="post">
                    <input type="hidden" name="ordersId" th:value="${ordersId}"/>
                    <input type="hidden" name="applianceId" th:value="${appliance.id}"/>
                    <input type="number" name="numbers" min="1" value="1" class="form-control d-inline" style="width:80px"/>
                    <button type="submit" class="btn btn-sm btn-primary" th:text="#{common.btn.add}">Add</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/my-orders/{id}/edit(id=${ordersId})}" class="btn btn-secondary" th:text="#{order.btn.back.to.order}">Back to order</a>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
