<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title th:text="#{my.orders.header.list}">My Orders</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{my.orders.header.list}">My Orders</h1>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${!cancelled} ? 'active'" th:href="@{/my-orders}" th:text="#{orders.tab.active}"></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${cancelled} ? 'active'" th:href="@{/my-orders(cancelled=true)}" th:text="#{orders.tab.cancelled}"></a>
        </li>
    </ul>

    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.user.id}">ID</th>
            <th th:text="#{object.order.status}">Status</th>
            <th th:text="#{object.order.created}">Created</th>
            <th th:unless="${cancelled}" th:text="#{object.order.note}">Note</th>
            <th th:if="${cancelled}" th:text="#{object.order.cancel.reason}"></th>
            <th th:if="${cancelled}" th:text="#{object.order.cancelled.by}"></th>
            <th th:if="${cancelled}" th:text="#{object.order.cancelled.at}"></th>
            <th th:text="#{object.order.amount}">Amount</th>
            <th th:text="#{object.operation}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td>
                <span th:text="${order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null} ? #{my.orders.status.revision} : #{|order.status.client.${order.status}|}"
                      th:classappend="${order.status.name() == 'DRAFT'} ? 'badge bg-light text-dark border'
                                    : (${order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null} ? 'badge bg-danger'
                                    : (${order.status.name() == 'PENDING_EMPLOYEE'} ? 'badge bg-secondary'
                                    : (${order.status.name() == 'PENDING_CLIENT'} ? 'badge bg-warning text-dark'
                                    : (${order.status.name() == 'PENDING_DELIVERY'} ? 'badge bg-primary'
                                    : (${order.status.name() == 'DELIVERING'} ? 'badge bg-success'
                                    : (${order.status.name() == 'DELIVERED'} ? 'badge bg-dark'
                                    : 'badge bg-light text-dark border'))))))">
                </span>
            </td>
            <td th:text="${order.createdAt != null} ? ${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')} : ''"></td>
            <td th:unless="${cancelled}" th:text="${order.employeeNote}"></td>
            <td th:if="${cancelled}" th:text="${order.cancelReason}"></td>
            <td th:if="${cancelled}" th:text="${order.cancelledBy}"></td>
            <td th:if="${cancelled}" th:text="${order.cancelledAt != null} ? ${#temporals.format(order.cancelledAt, 'yyyy-MM-dd HH:mm')} : ''"></td>
            <td th:text="${order.totalAmount}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}"
                       th:href="@{/my-orders/{id}/edit(id=${order.id})}" class="btn btn-sm btn-warning">
                        <i class="fa fa-pencil"></i>
                    </a>
                    <a th:unless="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}"
                       th:href="@{/my-orders/{id}/edit(id=${order.id})}" class="btn btn-sm btn-outline-secondary">
                        <i class="fa fa-eye"></i>
                    </a>
                    <form th:if="${order.status.name() == 'DRAFT'}"
                          th:action="@{/my-orders/{id}/submit(id=${order.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="patch"/>
                        <button type="submit" class="btn btn-sm btn-primary" th:text="#{my.orders.btn.submit}"></button>
                    </form>

                    <a th:unless="${order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED' or order.status.name() == 'CANCELLED'}"
                       th:href="@{/my-orders/{id}/cancel(id=${order.id})}" class="btn btn-sm btn-secondary"
                       th:text="#{my.orders.btn.cancel}"></a>
                    <form th:unless="${order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'}"
                          th:action="@{/my-orders/{id}(id=${order.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fa fa-trash"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <form th:action="@{/my-orders/create}" method="post" class="mt-3">
        <button type="submit" class="btn btn-primary" th:text="#{my.orders.btn.new}">Create New Order</button>
    </form>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
