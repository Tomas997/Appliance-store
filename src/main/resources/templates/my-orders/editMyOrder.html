<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Order Details</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1>Order #<span th:text="${orderId}"></span></h1>

    <div th:classappend="${order.status.name() == 'DRAFT'} ? 'alert alert-secondary'
                        : (${order.status.name() == 'PENDING_EMPLOYEE'} ? 'alert alert-secondary'
                        : (${order.status.name() == 'PENDING_CLIENT'} ? 'alert alert-warning'
                        : (${order.status.name() == 'PENDING_DELIVERY'} ? 'alert alert-primary'
                        : (${order.status.name() == 'DELIVERING'} ? 'alert alert-success'
                        : 'alert alert-light'))))" class="mb-3">
        <strong th:text="#{|order.status.client.${order.status}|}"></strong>
        <span class="mx-2">—</span>
        <span th:text="#{|my.orders.hint.${order.status}|}"></span>
    </div>

    <div class="mb-3" th:if="${order.employeeNote != null and !order.employeeNote.isEmpty()}">
        <div class="alert alert-info">
            <strong th:text="#{object.order.note}">Employee note:</strong>
            <span th:text="${order.employeeNote}"></span>
        </div>
    </div>

    <h2>Items</h2>
    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.appliance.name}">Name</th>
            <th>Quantity</th>
            <th th:text="#{object.order.amount}">Amount</th>
            <th th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}" th:text="#{object.operation}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}">
            <td th:text="${row.appliance.name}"></td>
            <td th:text="${row.number}"></td>
            <td th:text="${row.amount}"></td>
            <td th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}">
                <form th:action="@{/my-orders/{rowId}/row(rowId=${row.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="delete"/>
                    <input type="hidden" name="orderId" th:value="${orderId}"/>
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="fa fa-times"></i>
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex gap-2 mt-3">
        <a th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}"
           th:href="@{/my-orders/{id}/choice-appliance(id=${orderId})}" class="btn btn-secondary">
            Add Appliance
        </a>
        <form th:if="${order.status.name() == 'DRAFT' and !#lists.isEmpty(rows)}"
              th:action="@{/my-orders/{id}/submit(id=${orderId})}" method="post">
            <input type="hidden" name="_method" value="patch"/>
            <button type="submit" class="btn btn-primary" th:text="#{my.orders.btn.submit}"></button>
        </form>
        <form th:if="${order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null and !#lists.isEmpty(rows)}"
              th:action="@{/my-orders/{id}/submit(id=${orderId})}" method="post">
            <input type="hidden" name="_method" value="patch"/>
            <button type="submit" class="btn btn-primary" th:text="#{my.orders.btn.resubmit}"></button>
        </form>

        <form th:unless="${order.status.name() == 'DELIVERING'}"
              th:action="@{/my-orders/{id}/cancel(id=${orderId})}" method="post">
            <input type="hidden" name="_method" value="patch"/>
            <button type="submit" class="btn btn-warning" th:text="#{my.orders.btn.cancel}"></button>
        </form>
        <a th:href="@{/my-orders}" class="btn btn-outline-secondary">Back</a>
    </div>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
