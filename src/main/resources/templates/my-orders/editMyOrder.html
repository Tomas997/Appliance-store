<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title th:text="#{order.detail.title}">Order Details</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1><span th:text="#{order.detail.heading}">Order #</span><span th:text="${orderId}"></span></h1>
    <p class="text-muted" th:if="${order.createdAt != null}">
        <span th:text="#{object.order.created}"></span>: <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
    </p>

    <div th:classappend="${order.status.name() == 'DRAFT'} ? 'alert alert-secondary'
                        : (${order.status.name() == 'PENDING_EMPLOYEE'} ? 'alert alert-secondary'
                        : (${order.status.name() == 'PENDING_CLIENT'} ? 'alert alert-warning'
                        : (${order.status.name() == 'PENDING_DELIVERY'} ? 'alert alert-primary'
                        : (${order.status.name() == 'DELIVERING'} ? 'alert alert-success'
                        : (${order.status.name() == 'DELIVERED'} ? 'alert alert-dark'
                        : 'alert alert-light')))))" class="mb-3">
        <strong th:text="#{|order.status.client.${order.status}|}"></strong>
        <span class="mx-2">—</span>
        <span th:text="#{|my.orders.hint.${order.status}|}"></span>
    </div>

    <div class="mb-3" th:if="${priceChanges != null and !priceChanges.isEmpty()}">
        <div class="alert alert-warning">
            <strong th:text="#{my.orders.price.changed.title}"></strong>
            <ul class="mb-0">
                <li th:each="change : ${priceChanges}">
                    <span th:text="${change.applianceName}"></span>:
                    <span th:text="${change.oldAmount}"></span> → <span th:text="${change.newAmount}"></span>
                </li>
            </ul>
        </div>
    </div>

    <div class="mb-3" th:if="${order.employeeNote != null and !order.employeeNote.isEmpty()}">
        <div class="alert alert-info">
            <strong th:text="#{object.order.note}">Employee note:</strong>
            <span th:text="${order.employeeNote}"></span>
        </div>
    </div>

    <div class="mb-3" th:if="${order.status.name() == 'CANCELLED'}">
        <div class="alert alert-secondary">
            <div><strong th:text="#{object.order.cancel.reason}"></strong>: <span th:text="${order.cancelReason}"></span></div>
            <div><strong th:text="#{object.order.cancelled.at}"></strong>: <span th:text="${#temporals.format(order.cancelledAt, 'yyyy-MM-dd HH:mm')}"></span></div>
        </div>
    </div>

    <h2 th:text="#{order.items.heading}">Items</h2>
    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.appliance.name}">Name</th>
            <th th:text="#{common.label.quantity}">Quantity</th>
            <th th:text="#{object.order.amount}">Amount</th>
            <th th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}" th:text="#{object.operation}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}">
            <td th:text="${row.appliance.name}"></td>
            <td th:text="${row.number}"></td>
            <td th:text="${row.amount}"></td>
            <td th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}">
                <form th:action="@{/my-orders/{rowId}/row(rowId=${row.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="delete"/>
                    <input type="hidden" name="orderId" th:value="${orderId}"/>
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="fa fa-times"></i>
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex gap-2 mt-3">
        <a th:if="${order.status.name() == 'DRAFT' or (order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null)}"
           th:href="@{/my-orders/{id}/choice-appliance(id=${orderId})}" class="btn btn-secondary" th:text="#{order.btn.add.appliance}">
            Add Appliance
        </a>
        <form th:if="${order.status.name() == 'DRAFT' and !#lists.isEmpty(rows)}"
              th:action="@{/my-orders/{id}/submit(id=${orderId})}" method="post">
            <input type="hidden" name="_method" value="patch"/>
            <button type="submit" class="btn btn-primary" th:text="#{my.orders.btn.submit}"></button>
        </form>
        <form th:if="${order.status.name() == 'PENDING_EMPLOYEE' and order.employeeNote != null and !#lists.isEmpty(rows)}"
              th:action="@{/my-orders/{id}/submit(id=${orderId})}" method="post">
            <input type="hidden" name="_method" value="patch"/>
            <button type="submit" class="btn btn-primary" th:text="#{my.orders.btn.resubmit}"></button>
        </form>

        <a th:href="@{/my-orders}" class="btn btn-outline-secondary" th:text="#{common.btn.back}">Back</a>
    </div>

    <div th:if="${order.status.name() != 'DELIVERING' and order.status.name() != 'DELIVERED' and order.status.name() != 'CANCELLED'}" class="card mt-3">
        <div class="card-header fw-semibold" th:text="#{my.orders.btn.cancel}"></div>
        <div class="card-body">
            <form th:action="@{/my-orders/{id}/cancel(id=${orderId})}" method="post">
                <input type="hidden" name="_method" value="patch"/>
                <div class="mb-3">
                    <label class="form-label" th:text="#{object.order.cancel.reason}"></label>
                    <textarea name="reason" class="form-control" rows="2" required th:placeholder="#{my.orders.cancel.reason.prompt}"></textarea>
                </div>
                <button type="submit" class="btn btn-warning" th:text="#{my.orders.btn.cancel}"></button>
            </form>
        </div>
    </div>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
