<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>New client</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1 th:text="#{client.btn.new}"></h1>
<form action="#" th:action="@{add}" th:object="${client}" method="post">
    <p>
        <span th:text="#{object.user.name}"></span>
        <input type="text" th:field="*{name}"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.user.email}"></span>
        <input type="text" th:field="*{email}"/>
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.user.password}"></span>
        <input type="text" th:field="*{password}"/>
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.client.card}"></span>
        <input type="text" th:field="*{card}"/>
        <span th:if="${#fields.hasErrors('card')}" th:errors="*{card}" class="text-danger"></span>
    </p>
    <p><input type="submit" value="Submit"/> <input type="reset" value="Reset"/></p>
</form>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
