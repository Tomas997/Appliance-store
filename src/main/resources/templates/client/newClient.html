<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{client.btn.new}"></title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{client.btn.new}"></h1>
    <form action="#" th:action="@{add}" th:object="${client}" method="post">
        <div class="mb-3">
            <label class="form-label" th:text="#{object.user.name}"></label>
            <input type="text" class="form-control" th:field="*{name}"/>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.user.email}"></label>
            <input type="text" class="form-control" th:field="*{email}"/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.user.password}"></label>
            <input type="text" class="form-control" th:field="*{password}"/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.client.card}"></label>
            <input type="text" class="form-control" th:field="*{card}"/>
            <span th:if="${#fields.hasErrors('card')}" th:errors="*{card}" class="text-danger small"></span>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/clients}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
