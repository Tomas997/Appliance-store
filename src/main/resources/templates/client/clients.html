<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link th:href="@{/styles/css/main.css}" rel="stylesheet"/>
    <script th:src="@{/js/pagination.js}"></script>
    <title th:text="#{client.header.list}"></title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{client.header.list}"></h1>
    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.user.id}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('name', 'object.user.name')}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('email', 'object.user.email')}"></th>
            <th th:text="#{object.client.card}"></th>
            <th sec:authorize="hasRole('ADMIN')" th:text="#{object.operation}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client: ${clients}">
            <td th:text="${client.id}"/>
            <td th:text="${client.name}"/>
            <td th:text="${client.email}"/>
            <td th:text="${client.card}"/>
            <td sec:authorize="hasRole('ADMIN')">
                <div class="d-flex gap-2">
                    <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-sm btn-warning">
                        <i class="fa fa-pencil"></i>
                    </a>
                    <form th:action="@{/clients/{id}(id=${client.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fa fa-minus"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/table-fragments :: pagination}"></div>

    <a sec:authorize="hasRole('ADMIN')" th:href="@{/clients/add}" class="btn btn-primary mt-2"
       th:text="#{client.btn.new}"></a>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
