<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Edit Employee</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1>Edit Employee</h1>
<form action="#" th:action="@{/employees/{id}/edit(id=${employeeId})}" th:object="${employee}" method="post">
    <input type="hidden" name="_method" value="PUT"/>
    <p>
        <span th:text="#{object.user.name}"></span>
        <input type="text" th:field="*{name}"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.user.email}"></span>
        <input type="text" th:field="*{email}"/>
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.user.password}"></span>
        <input type="password" th:field="*{password}"/>
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.employee.department}"></span>
        <input type="text" th:field="*{department}"/>
        <span th:if="${#fields.hasErrors('department')}" th:errors="*{department}" class="text-danger"></span>
    </p>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/employees}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
