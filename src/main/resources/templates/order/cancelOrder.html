<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{orders.btn.cancel}">Cancel Order</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{orders.btn.cancel}"></h1>
    <p class="text-muted">
        <span th:text="#{object.order.id}"></span>: <span th:text="${orderId}"></span> —
        <span th:text="${orderInfo.clientName}"></span>
    </p>

    <form th:action="@{/orders/{id}/cancel(id=${orderId})}" method="post">
        <input type="hidden" name="_method" value="patch"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.order.cancel.reason}"></label>
            <textarea name="reason" class="form-control" rows="3" required th:placeholder="#{orders.cancel.reason.prompt}"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger" th:text="#{orders.btn.cancel}"></button>
            <a th:href="@{/orders}" class="btn btn-secondary" th:text="#{common.btn.back}">Back</a>
        </div>
    </form>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
