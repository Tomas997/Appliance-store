<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>New Order</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1 th:text="#{orders.btn.new}"></h1>
<form action="#" th:action="@{add}" th:object="${order}" method="post">
    <p>
        <span th:text="#{object.order.client}"></span>
        <select th:field="*{clientId}">
            <option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.name}"></option>
        </select>
        <span th:if="${#fields.hasErrors('clientId')}" th:errors="*{clientId}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.order.employee}"></span>
        <select th:field="*{employeeId}">
            <option value="" th:text="'— not assigned —'"></option>
            <option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.name}"></option>
        </select>
        <span th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}" class="text-danger"></span>
    </p>
    <div class="btn-group">
        <button type="submit" class="btn btn-primary">Create</button>
        <input type="reset" class="btn btn-secondary" value="Reset"/>
    </div>
</form>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
