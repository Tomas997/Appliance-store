<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Edit Order</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1>Edit Order</h1>
<form action="#" th:action="@{/orders/{id}/edit(id=${orderId})}" th:object="${order}" method="post">
    <input type="hidden" name="_method" value="PUT"/>
    <p>
        <span th:text="#{object.order.client}"></span>
        <select th:field="*{clientId}">
            <option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.name}"></option>
        </select>
        <span th:if="${#fields.hasErrors('clientId')}" th:errors="*{clientId}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.order.employee}"></span>
        <select th:field="*{employeeId}">
            <option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.name}"></option>
        </select>
        <span th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}" class="text-danger"></span>
    </p>
    <p>
        <span th:text="#{object.order.approved}"></span>
        <input type="checkbox" th:field="*{approved}"/>
    </p>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/orders}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<h2>Order rows</h2>
<table class="table table-hover">
    <thead>
    <tr class="table-dark">
        <th>ID</th>
        <th th:text="#{object.appliance.name}"></th>
        <th>Number</th>
        <th th:text="#{object.appliance.price}"></th>
        <th th:text="#{object.operation}"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${rows}">
        <td th:text="${row.id}"/>
        <td th:text="${row.appliance.name}"/>
        <td th:text="${row.number}"/>
        <td th:text="${row.amount}"/>
        <td>
            <form th:action="@{/orders/{rowId}/row(rowId=${row.id})}" method="post" style="display:inline;">
                <input type="hidden" name="_method" value="delete"/>
                <input type="hidden" name="orderId" th:value="${orderId}"/>
                <button type="submit" class="btn btn-sm btn-danger">
                    <i class="fa fa-times"></i>
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<a th:href="@{/orders/{id}/choice-appliance(id=${orderId})}" class="btn btn-secondary">Add appliance</a>

<div th:insert="~{footer::footer}"></div>
</body>
</html>
