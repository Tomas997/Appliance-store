<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
    <title th:text="#{orders.header.list}">Orders list</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{orders.header.list}">Orders list</h1>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${!cancelled} ? 'active'" th:href="@{/orders}" th:text="#{orders.tab.active}"></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${cancelled} ? 'active'" th:href="@{/orders(cancelled=true)}" th:text="#{orders.tab.cancelled}"></a>
        </li>
    </ul>

    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:replace="~{fragments/table-fragments :: sortHeader('id', 'object.user.id')}"></th>
            <th th:text="#{object.order.client}"></th>
            <th th:text="#{object.order.employee}"></th>
            <th th:text="#{object.order.status}"></th>
            <th th:text="#{object.order.created}"></th>
            <th th:text="#{object.order.amount}"></th>
            <th th:unless="${cancelled}" th:text="#{object.order.note}"></th>
            <th th:if="${cancelled}" th:text="#{object.order.cancel.reason}"></th>
            <th th:if="${cancelled}" th:text="#{object.order.cancelled.by}"></th>
            <th th:if="${cancelled}" th:text="#{object.order.cancelled.at}"></th>
            <th th:text="#{object.operation}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order: ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.clientName}"></td>
            <td th:text="${order.employeeName}"></td>
            <td>
                <span th:text="#{|order.status.${order.status}|}"
                      th:classappend="${order.status.name() == 'PENDING_EMPLOYEE'} ? 'badge bg-warning text-dark'
                                    : (${order.status.name() == 'PENDING_CLIENT'} ? 'badge bg-info text-dark'
                                    : (${order.status.name() == 'PENDING_DELIVERY'} ? 'badge bg-primary'
                                    : (${order.status.name() == 'DELIVERING'} ? 'badge bg-success'
                                    : (${order.status.name() == 'DELIVERED'} ? 'badge bg-dark'
                                    : 'badge bg-secondary'))))">
                </span>
            </td>
            <td th:text="${order.createdAt != null} ? ${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')} : ''"></td>
            <td th:text="${order.totalAmount}"></td>
            <td th:unless="${cancelled}" th:text="${order.employeeNote}"></td>
            <td th:if="${cancelled}" th:text="${order.cancelReason}"></td>
            <td th:if="${cancelled}" th:text="${order.cancelledBy}"></td>
            <td th:if="${cancelled}" th:text="${order.cancelledAt != null} ? ${#temporals.format(order.cancelledAt, 'yyyy-MM-dd HH:mm')} : ''"></td>
            <td>
                <div class="d-flex gap-2">
                    <a th:unless="${order.status.name() == 'CANCELLED' or order.status.name() == 'DELIVERED'}" th:href="@{orders/}+${order.id}+@{/edit}" class="btn btn-sm btn-warning">
                        <i class="fa fa-pencil"></i>
                    </a>
                    <a th:if="${order.status.name() == 'CANCELLED' or order.status.name() == 'DELIVERED'}" th:href="@{orders/}+${order.id}+@{/edit}" class="btn btn-sm btn-outline-secondary">
                        <i class="fa fa-eye"></i>
                    </a>
                    <a th:unless="${order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED' or order.status.name() == 'CANCELLED'}"
                       th:href="@{/orders/{id}/cancel(id=${order.id})}" class="btn btn-sm btn-secondary">
                        <i class="fa fa-ban"></i>
                    </a>
                    <form th:unless="${order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'}"
                          th:action="@{/orders/{id}(id=${order.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fa fa-minus"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/table-fragments :: pagination}"></div>

    <a th:href="@{orders/add}" class="btn btn-primary" th:text="#{orders.btn.new}"></a>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
