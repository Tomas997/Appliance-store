<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link th:href="@{/styles/css/main.css}" rel="stylesheet"/>
    <script th:src="@{/js/pagination.js}"></script>
    <title>Orders list</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main>
    <h1 th:text="#{orders.header.list}">Orders list</h1>
    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:replace="~{fragments/table-fragments :: sortHeader('id', 'object.user.id')}"></th>
            <th th:text="#{object.order.client}"></th>
            <th th:text="#{object.order.employee}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('approved', 'object.order.approved')}"></th>
            <th th:text="#{object.order.amount}"></th>
            <th th:text="#{object.operation}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order: ${orders}">
            <td><span class="float-end" th:text="${order.id}"/></td>
            <td><span class="float-end" th:text="${order.clientName}"/></td>
            <td><span class="float-end" th:text="${order.employeeName}"/></td>
            <td>
                <div th:if="${order.approved}">
                    <form th:action="@{/orders/{id}/unapproved(id=${order.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="patch"/>
                        <button type="submit" class="btn btn-sm btn-success">
                            <i class="fa fa-check"></i>
                        </button>
                    </form>
                </div>
                <div th:unless="${order.approved}">
                    <form th:action="@{/orders/{id}/approved(id=${order.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="patch"/>
                        <button type="submit" class="btn btn-sm btn-secondary">
                            <i class="fa fa-minus"></i>
                        </button>
                    </form>
                </div>
            </td>
            <td th:text="${order.totalAmount}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a th:href="@{orders/}+${order.id}+@{/edit}" class="btn btn-sm btn-warning">
                        <i class="fa fa-pencil"></i>
                    </a>
                    <form th:action="@{/orders/{id}(id=${order.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fa fa-minus"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/table-fragments :: pagination}"></div>

    <a th:href="@{orders/add}" class="btn btn-primary" th:text="#{orders.btn.new}"></a>
</main>
<div th:insert="~{footer::footer}"></div>


</body>
</html>
