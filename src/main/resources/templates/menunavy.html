<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="navy">
    <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/" th:text="#{shop.name}"></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                        <a class="nav-link" th:href="@{/clients}" th:text="#{clients.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/employees}" th:text="#{employees.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/deliverers}" th:text="#{deliverer.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                        <a class="nav-link" th:href="@{/manufacturers}" th:text="#{manufacturers.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                        <a class="nav-link" th:href="@{/appliances}" th:text="#{appliances.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                        <a class="nav-link" th:href="@{/orders}" th:text="#{order.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                        <a class="nav-link" th:href="@{/my-orders}" th:text="#{my.orders.menu.name}"></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('DELIVERER')">
                        <a class="nav-link" th:href="@{/deliveries}" th:text="#{deliveries.menu.name}"></a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{''(lang='en')}">EN</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{''(lang='uk')}">UK</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-white-50" sec:authentication="name"></span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2" th:text="#{nav.btn.logout}">Logout</button>
                        </form>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/login}" th:text="#{nav.btn.login}">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
<div th:fragment="line">
    <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" th:text="#{shop.name}">Appliance store</a>
        </div>
    </nav>
</div>
</body>
</html>
