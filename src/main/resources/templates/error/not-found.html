<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{error.not.found}">Not Found</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-5 text-center">
    <h1 class="display-4">404</h1>
    <h2 class="mb-3" th:text="#{error.not.found}">Not Found</h2>
    <p class="text-muted mb-4" th:text="${errorMessage}"></p>
    <a th:href="@{/}" class="btn btn-primary" th:text="#{error.btn.home}">Back to Home</a>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
