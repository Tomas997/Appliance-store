<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{deliveries.menu.name}">Deliveries</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{deliveries.menu.name}">Deliveries</h1>

    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.user.id}">ID</th>
            <th th:text="#{object.order.client}">Client</th>
            <th th:text="#{object.order.employee}">Employee</th>
            <th th:text="#{object.order.amount}">Amount</th>
            <th th:text="#{object.operation}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.clientName}"></td>
            <td th:text="${order.employeeName}"></td>
            <td th:text="${order.totalAmount}"></td>
            <td>
                <form th:action="@{/deliveries/{id}/confirm(id=${order.id})}" method="post">
                    <input type="hidden" name="_method" value="patch"/>
                    <button type="submit" class="btn btn-sm btn-success">Confirm Delivery</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(orders)}" class="text-muted">No orders pending delivery.</p>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
