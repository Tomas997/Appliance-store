<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{deliveries.menu.name}">Deliveries</title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{deliveries.menu.name}">Deliveries</h1>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == 'pending'} ? 'active'" th:href="@{/deliveries(tab='pending')}" th:text="#{deliveries.tab.pending}"></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == 'delivering'} ? 'active'" th:href="@{/deliveries(tab='delivering')}" th:text="#{deliveries.tab.delivering}"></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == 'delivered'} ? 'active'" th:href="@{/deliveries(tab='delivered')}" th:text="#{deliveries.tab.delivered}"></a>
        </li>
    </ul>

    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.user.id}">ID</th>
            <th th:text="#{object.order.client}">Client</th>
            <th th:text="#{object.order.employee}">Employee</th>
            <th th:text="#{object.order.amount}">Amount</th>
            <th th:if="${tab != 'delivered'}" th:text="#{object.operation}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.clientName}"></td>
            <td th:text="${order.employeeName}"></td>
            <td th:text="${order.totalAmount}"></td>
            <td th:if="${tab == 'pending'}">
                <form th:action="@{/deliveries/{id}/confirm(id=${order.id})}" method="post">
                    <input type="hidden" name="_method" value="patch"/>
                    <button type="submit" class="btn btn-sm btn-success">Confirm Delivery</button>
                </form>
            </td>
            <td th:if="${tab == 'delivering'}">
                <form th:action="@{/deliveries/{id}/deliver(id=${order.id})}" method="post">
                    <input type="hidden" name="_method" value="patch"/>
                    <button type="submit" class="btn btn-sm btn-primary" th:text="#{deliveries.btn.deliver}"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/table-fragments :: pagination}"></div>

    <p th:if="${#lists.isEmpty(orders)}" class="text-muted">No orders in this view.</p>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
