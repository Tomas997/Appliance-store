<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<th th:fragment="sortHeader(field, labelKey)"
    th:with="nextDir=${(sortField == field and sortDir == 'asc') ? 'desc' : 'asc'}">
    <a th:href="|?page=0&size=${pageSize}&sort=${field},${nextDir}|"
       class="text-white text-decoration-none">
        <span th:text="#{__${labelKey}__}"></span>
        <i th:if="${sortField == field}"
           th:class="${sortDir == 'asc'} ? 'fa fa-sort-asc' : 'fa fa-sort-desc'"></i>
    </a>
</th>


<div th:fragment="pagination" class="d-flex align-items-center my-3">

    <!-- Зліва: кількість елементів -->
    <div style="min-width: 180px" class="d-flex align-items-center gap-2">
        <label class="text-nowrap small text-muted">На сторінці:</label>
        <a th:each="size : ${ {10, 25, 50} }"
           th:href="|?page=0&size=${size}&sort=${sortField},${sortDir}|"
           th:text="${size}"
           th:classappend="${pageSize == size} ? 'fw-bold text-decoration-underline' : ''"
           class="link-secondary mx-1">
        </a>
    </div>

    <!-- По центру: номери сторінок -->
    <div class="flex-grow-1 d-flex justify-content-center">
        <nav th:if="${totalPages > 1}">
            <ul class="pagination mb-0">

                <!-- Назад -->
                <li class="page-item" th:classappend="${currentPage == 0} ? disabled">
                    <a class="page-link" th:href="|?page=${currentPage - 1}&size=${pageSize}&sort=${sortField},${sortDir}|">
                        &laquo;
                    </a>
                </li>

                <!-- Номери -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? active">
                    <a class="page-link"
                       th:href="|?page=${i}&size=${pageSize}&sort=${sortField},${sortDir}|"
                       th:text="${i + 1}">
                    </a>
                </li>

                <!-- Вперед -->
                <li class="page-item"
                    th:classappend="${currentPage == totalPages - 1} ? disabled">
                    <a class="page-link" th:href="|?page=${currentPage + 1}&size=${pageSize}&sort=${sortField},${sortDir}|">
                        &raquo;
                    </a>
                </li>

            </ul>
        </nav>
    </div>

    <!-- Правий спейсер для симетрії -->
    <div style="min-width: 180px"></div>

</div>
</body>
</html>
