<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{manufacturer.header.edit}">Edit Manufacturer</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1 th:text="#{manufacturer.header.edit}">Edit Manufacturer</h1>
<form action="#" th:action="@{/manufacturers/{id}/edit(id=${manufacturerId})}" th:object="${manufacturer}" method="post">
    <input type="hidden" name="_method" value="PUT"/>
    <p>
        <span th:text="#{object.manufacturer.name}"></span>
        <input type="text" th:field="*{name}"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
    </p>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" th:text="#{common.btn.save}">Save</button>
        <a th:href="@{/manufacturers}" class="btn btn-secondary" th:text="#{common.btn.cancel}">Cancel</a>
    </div>
</form>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
