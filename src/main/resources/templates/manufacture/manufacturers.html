<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script th:src="@{/js/pagination.js}"></script>
    <title>Manufacturers list</title>
</head>
<body>
<div th:insert="~{menunavy::navy}"></div>
<h1 th:text="#{manufacturer.header.list}"></h1>
<table class="table table-hover">
    <thead>
    <tr class="table-dark">
        <th th:text="#{object.manufacturer.id}">ID</th>
        <th th:replace="~{fragments/table-fragments :: sortHeader('email', 'object.manufacturer.name')}"></th>
        <th th:text="#{object.operation}"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="manufacturer: ${manufacturers}">
        <td th:text="${manufacturer.id}"/>
        <td th:text="${manufacturer.name}"/>
        <td>
            <div class="d-flex gap-2">
                <a th:href="@{/manufacturers/{id}/edit(id=${manufacturer.id})}" class="btn btn-sm btn-warning">
                    <i class="fa fa-pencil"></i>
                </a>
                <a th:href="@{/manufacturers/}+${manufacturer.id}+@{/delete}">
                    <span class="icon">
                          <i class="fa fa-minus"></i>
                    </span>
                </a>
            </div>
        </td>
    </tr>

    </tbody>
</table>

<div th:replace="~{fragments/table-fragments :: pagination}"></div>

<a th:href="@{manufacturers/add}" class="btn btn-primary" th:text="#{manufacturer.btn.new}"></a>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
