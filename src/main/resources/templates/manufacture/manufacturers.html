<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
    <title th:text="#{manufacturer.header.list}"></title>
</head>
<body>
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container mt-3">
    <h1 th:text="#{manufacturer.header.list}"></h1>
    <table class="table table-hover">
        <thead>
        <tr class="table-dark">
            <th th:text="#{object.manufacturer.id}"></th>
            <th th:replace="~{fragments/table-fragments :: sortHeader('name', 'object.manufacturer.name')}"></th>
            <th th:text="#{object.operation}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="manufacturer: ${manufacturers}">
            <td th:text="${manufacturer.id}"/>
            <td th:text="${manufacturer.name}"/>
            <td>
                <div class="d-flex gap-2">
                    <a th:href="@{/manufacturers/{id}/edit(id=${manufacturer.id})}" class="btn btn-sm btn-warning">
                        <i class="fa fa-pencil"></i>
                    </a>
                    <form th:action="@{/manufacturers/{id}(id=${manufacturer.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fa fa-minus"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/table-fragments :: pagination}"></div>

    <a th:href="@{manufacturers/add}" class="btn btn-primary mt-2" th:text="#{manufacturer.btn.new}"></a>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
