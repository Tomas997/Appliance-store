<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{register.title}">Register</title>
</head>
<body>
<div th:insert="~{menunavy::line}"></div>

<main class="container mt-5" style="max-width: 420px;">
    <h2 class="mb-4 text-center" th:text="#{register.title}">Create account</h2>

    <form th:action="@{/register}" th:object="${client}" method="post">
        <div class="mb-3">
            <label class="form-label" th:text="#{object.user.name}"></label>
            <input type="text" class="form-control" th:field="*{name}" required autofocus/>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.user.email}"></label>
            <input type="email" class="form-control" th:field="*{email}" required/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.user.password}"></label>
            <input type="password" class="form-control" th:field="*{password}" required/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{object.client.card}"></label>
            <input type="text" class="form-control" th:field="*{card}" required/>
            <span th:if="${#fields.hasErrors('card')}" th:errors="*{card}" class="text-danger small"></span>
        </div>
        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary" th:text="#{register.submit}">Register</button>
        </div>
        <p class="text-center">
            <a th:href="@{/login}" th:text="#{register.have.account}">Already have an account? Sign in</a>
        </p>
    </form>
</main>

<div th:insert="~{footer::footer}"></div>
</body>
</html>
