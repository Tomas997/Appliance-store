<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Login</title>
</head>
<body>
<div th:insert="~{menunavy::line}"></div>

<main class="container mt-5" style="max-width: 420px;">
    <h2 class="mb-4 text-center">Sign In</h2>

    <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="#{login.error}">
    </div>
    <div th:if="${param.logout}" class="alert alert-success" role="alert" th:text="#{login.logout}">
    </div>
    <div th:if="${param.expired}" class="alert alert-warning" role="alert" th:text="#{login.expired}">
    </div>
    <div th:if="${param.registered}" class="alert alert-success" role="alert" th:text="#{login.registered}">
    </div>
    <div th:if="${param.csrf}" class="alert alert-warning" role="alert" th:text="#{login.csrf}">
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email"
                   class="form-control" placeholder="Enter your email" required autofocus/>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Enter your password" required/>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
        </div>
    </form>
    <p class="text-center mt-3">
        <a th:href="@{/register}" th:text="#{register.no.account}">No account? Register</a>
    </p>
</main>

<div th:insert="~{footer::footer}"></div>
</body>
</html>
